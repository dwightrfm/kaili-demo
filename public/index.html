<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RFM Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #0f0f0f; color: #fff; height: 100vh; display: flex; flex-direction: column; }
    #header { padding: 16px 20px; background: #1a1a1a; font-weight: bold; font-size: 16px; border-bottom: 1px solid #333; }
    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 75%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 14px; }
    .user { background: #2563eb; align-self: flex-end; }
    .agent { background: #1e1e1e; align-self: flex-start; border: 1px solid #333; }
    #input-area { display: flex; padding: 16px; gap: 10px; background: #1a1a1a; border-top: 1px solid #333; }
    #input { flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid #333; background: #0f0f0f; color: #fff; font-size: 14px; outline: none; }
    #send { padding: 12px 20px; background: #2563eb; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
  </style>
</head>
<body>
  <div id="header">RFM Agent</div>
  <div id="messages"></div>
  <div id="input-area">
    <input id="input" type="text" placeholder="Ask the agent..." />
    <button id="send">Send</button>
  </div>
  <script>
    const messages = [];
    const messagesEl = document.getElementById('messages');
    const input = document.getElementById('input');
    const send = document.getElementById('send');
    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      addMessage('user', text);
      messages.push({ role: 'user', content: text });
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: messages.slice(0, -1) })
      });
      const data = await res.json();
      addMessage('agent', data.reply);
      messages.push({ role: 'assistant', content: data.reply });
    }
    send.addEventListener('click', sendMessage);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
  </script>
</body>
</html>
